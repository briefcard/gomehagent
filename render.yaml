services:
  - type: web
    name: assistant-web
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.web:app --host 0.0.0.0 --port $PORT
    envVars:
      - fromGroup: assistant-env
      - key: DATABASE_URL
        fromDatabase:
          name: assistant-db
          property: connectionString

  - type: worker
    name: assistant-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.worker
    envVars:
      - fromGroup: assistant-env
      - key: DATABASE_URL
        fromDatabase:
          name: assistant-db
          property: connectionString

databases:
  - name: assistant-db
    plan: basic-256mb

envVarGroups:
  - name: assistant-env
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GMAIL_ACCOUNTS_JSON
        sync: false
      - key: APPROVER_EMAIL
        value: gomehsaias@gmail.com
      - key: PUBLIC_BASE_URL
        sync: false
      - key: APPROVAL_SECRET
        generateValue: true
      - key: TZ
        value: America/New_York
      # --- SEO agent (declared here so values persist across deploys; secret
      #     values + the long SEO_SITES_JSON are set in the dashboard) ---
      - key: SEMRUSH_API_KEY
        sync: false
      - key: SHOPIFY_STORES_JSON
        sync: false
      - key: WORDPRESS_SITES_JSON
        sync: false
      - key: SEO_SITES_JSON
        sync: false
      - key: SEO_GOOGLE_ALIAS
        value: personal
      - key: SEO_PRIMARY_SITE
        value: baci
      - key: SEO_MODEL
        value: claude-sonnet-4-6
      # WhatsApp Cloud API — leave blank until Meta verification completes
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: WHATSAPP_APPROVER_NUMBER
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
